<!DOCTYPE HTML>
<html>
<head>
    <meta charset="UTF-8">
    <title>User Login Page</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .alert-box {
            display: none;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 14px;
            font-size: 0.9rem;
            font-weight: 500;
            animation: fadeIn 0.3s ease;
        }

        .alert-box.error {
            background-color: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.6);
            color: #ff6b6b;
        }

        .alert-box.success {
            background-color: rgba(40, 167, 69, 0.15);
            border: 1px solid rgba(40, 167, 69, 0.6);
            color: #51cf66;
        }

        .alert-box.show {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-icon {
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="background-blur"></div>
        <div class="background-blur-bottom"></div>

        <div class="auth-box">
            <h1>EDUQUEST</h1>
            <p>Initialize your academy credentials</p>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab active" onclick="showForm('login')">Sign In</button>
                <button class="tab" onclick="showForm('signup')">Sign Up</button>
            </div>

            <!-- Global Alert Box (shared between forms) -->
            <div id="alert-box" class="alert-box" role="alert">
                <span class="alert-icon" id="alert-icon"></span>
                <span id="alert-message"></span>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="active" onsubmit="handleLogin(event)">
                <label for="login_email">Email</label>
                <input type="text" id="login_email" name="login_email" placeholder="Enter email" required>

                <label for="login_password">Password</label>
                <input type="password" id="login_password" name="login_password" placeholder="Enter Password" required>

                <button type="submit" name="login_submit" id="login-btn" class="submit-btn">Sign In</button>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" onsubmit="handleSignup(event)">
                <label for="signup_username">Username</label>
                <input type="text" id="signup_username" name="signup_username" placeholder="Enter username" required>

                <label for="signup_email">Email</label>
                <input type="email" id="signup_email" name="signup_email" placeholder="Enter email" required>

                <label for="signup_password">Password</label>
                <input type="password" id="signup_password" name="signup_password" placeholder="Enter Password" required>

                <label for="signup_confirm">Confirm Password</label>
                <input type="password" id="signup_confirm" name="signup_confirm" placeholder="Confirm Password" required>

                <label for="signup_role">Account Type</label> <br> <br>

                <div class="role-options">
                    <label>
                        <input type="radio" name="role" value="student" required>
                        Student
                    </label>
                    <label>
                        <input type="radio" name="role" value="teacher">
                        Teacher
                    </label>
                </div>

                <button type="submit" name="signup_submit" id="signup-btn" class="submit-btn">Sign Up</button>
            </form>

            <div class="footer">
                &#10003; Secure Connection
            </div>
        </div>
    </div>

    <script>
        // ── Tab switching ──────────────────────────────────────────────
        function showForm(form) {
            const loginForm  = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const tabs       = document.querySelectorAll('.tab');

            clearAlert();

            if (form === 'login') {
                loginForm.classList.add('active');
                signupForm.classList.remove('active');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                signupForm.classList.add('active');
                loginForm.classList.remove('active');
                tabs[1].classList.add('active');
                tabs[0].classList.remove('active');
            }
        }

        // ── Alert helpers ──────────────────────────────────────────────
        function showAlert(type, message) {
            const box     = document.getElementById('alert-box');
            const icon    = document.getElementById('alert-icon');
            const msgSpan = document.getElementById('alert-message');

            box.className       = `alert-box ${type} show`;
            icon.textContent    = type === 'error' ? '❌' : '✅';
            msgSpan.textContent = message;
        }

        function clearAlert() {
            const box = document.getElementById('alert-box');
            box.className = 'alert-box';
        }

        // ── Login handler ──────────────────────────────────────────────
        async function handleLogin(e) {
            e.preventDefault();
            clearAlert();

            const btn  = document.getElementById('login-btn');
            const form = document.getElementById('login-form');
            const data = new FormData(form);
            data.append('login_submit', '1');

            btn.disabled    = true;
            btn.textContent = 'Signing in…';

            try {
                const res  = await fetch('auth.php', { method: 'POST', body: data });
                const json = await res.json();

                if (json.status === 'success') {
                    showAlert('success', json.message || 'Signed in successfully! Redirecting…');
                    setTimeout(() => { window.location.href = json.redirect || 'index.php'; }, 1200);
                } else {
                    showAlert('error', json.message || 'Login failed. Please try again.');
                    btn.disabled    = false;
                    btn.textContent = 'Sign In';
                }
            } catch (err) {
                showAlert('error', 'Unable to connect. Please check your connection and try again.');
                btn.disabled    = false;
                btn.textContent = 'Sign In';
            }
        }

        // ── Signup handler ─────────────────────────────────────────────
        async function handleSignup(e) {
            e.preventDefault();
            clearAlert();

            const password = document.getElementById('signup_password').value;
            const confirm  = document.getElementById('signup_confirm').value;

            if (password !== confirm) {
                showAlert('error', 'Passwords do not match. Please try again.');
                return;
            }

            const btn  = document.getElementById('signup-btn');
            const form = document.getElementById('signup-form');
            const data = new FormData(form);
            data.append('signup_submit', '1');

            btn.disabled    = true;
            btn.textContent = 'Creating account…';

            try {
                const res  = await fetch('auth.php', { method: 'POST', body: data });
                const json = await res.json();

                if (json.status === 'success') {
                    showAlert('success', json.message || 'Account created! Redirecting…');
                    form.reset();
                    if (json.redirect) {
                        setTimeout(() => { window.location.href = json.redirect; }, 1200);
                    } else {
                        setTimeout(() => showForm('login'), 2000);
                    }
                } else {
                    showAlert('error', json.message || 'Sign up failed. Please try again.');
                }
            } catch (err) {
                showAlert('error', 'Unable to connect. Please check your connection and try again.');
            } finally {
                btn.disabled    = false;
                btn.textContent = 'Sign Up';
            }
        }

        // ── Show logout success if redirected here with ?logout=1 ──────
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('logout') === '1') {
                showAlert('success', 'You have been signed out successfully.');
                // Clean the URL so refreshing won't re-show the message
                history.replaceState(null, '', 'login.html');
            }
        });
    </script>
</body>
</html>

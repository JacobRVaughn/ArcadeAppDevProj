<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Navigation Bar Test</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="auth-container">
        <div class="background-blur" aria-hidden="true"></div>
        <div class="background-blur-bottom" aria-hidden="true"></div>

        <div class="preview-wrap">
            <div class="auth-box preview-game-card">
                <div class="game-frame-wrap">
                    <iframe id="gameFrame" class="game-frame" src="games/math_catch/build/web/index.html" title="Game"
                        loading="lazy"></iframe>
                </div>
            </div>

            <div class="game-nav" aria-label="Game navigation">
                <a class="nav-lobby-btn" href="lobby.html">
                    RETURN TO LOBBY
                </a>

                <button class="nav-student-box leaderboard-roster-row leaderboard-row-you" id="studentBox"
                    type="button">
                    <div class="leaderboard-roster-left">
                        <div class="leaderboard-avatar" aria-hidden="true"></div>
                        <div class="leaderboard-meta">
                            <div class="leaderboard-name" id="studentName"></div>
                            <div class="leaderboard-xp" id="studentXp"></div>
                        </div>
                    </div>
                </button>

                <button class="nav-mini-leaderboard" id="viewAllButton" type="button" aria-haspopup="dialog"
                    aria-controls="fullLeaderboard">
                    <div class="nav-mini-left">
                        <div class="nav-mini-icon" aria-hidden="true">★</div>
                        <div class="nav-mini-text">
                            <strong>LEADERBOARD</strong>
                            <span>View game ranking</span>
                        </div>
                    </div>

                    <div class="nav-mini-stats">
                        <div class="rank" id="miniRank"></div>
                        <div class="score" id="miniScore"></div>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <div id="fullLeaderboard" class="full-leaderboard" aria-hidden="true">
        <div class="full-leaderboard-content" role="dialog" aria-modal="true" aria-labelledby="fullLeaderboardTitle">
            <div class="full-leaderboard-header">
                <div class="leaderboard-title">
                    <div class="leaderboard-star" aria-hidden="true">★</div>
                    <div>
                        <h1 id="fullLeaderboardTitle">LEADERBOARD</h1>
                    </div>
                </div>

                <button id="closeFullLeaderboard" class="close-full-leaderboard"
                    aria-label="Close full leaderboard">✕</button>
            </div>

            <div class="full-leaderboard-roster" id="fullRoster" role="list"></div>
        </div>
    </div>

    <script src="leaderboard.js"></script>
    <script src="navigation_bar.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>EduQuest Lobby</title>

    <!-- Reuse your existing CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="auth-container">

        <!-- Background blobs -->
        <div class="background-blur"></div>
        <div class="background-blur-bottom"></div>

        <!-- Lobby box (reuse auth-box styling) -->
        <div class="auth-box">
            <h1>EDUQUEST</h1>
            <p>Select a game type to begin</p>

            <!-- Game Type Selection -->
            <div class="tabs">
                <button class="tab active" id="catchStars" onclick="goToGame(event, 'math_catch', 'math_catch', 'Math Catch')">
                    Math Catch
                </button>

                <button class="tab" id="readingQuest" onclick="goToGame(event, 'reading_quest', 'reading_quest', 'Word Blitz')">
                    Word Blitz
                </button>

                <button class="tab" id="math-kingdom"
                    onclick="goToGame(event, 'tower', 'math-kingdom', 'Math & Letters Tower Kingdom')"> 
                    Math & Letters Tower Kingdom
                </button>
                <button class="tab" id="capital_escape"
                    onclick="goToGame(event, 'capital_escape', 'capital_escape', 'Capital Escape')"> 
                    Capital Escape
                </button>
                <button class="tab" id="physics"
                    onclick="goToGame(event, 'physics', 'physics', 'Friction Simulator')"> 
                    Friction Simulator
                </button>
            </div>

            <!-- Footer -->
        </div>

    </div>

    <script>
        function goToGame(event, folder, gameId, title) {
            event.preventDefault();
            window.location.href =
                `game_shell.html?folder=${encodeURIComponent(folder)}&game=${encodeURIComponent(gameId)}&title=${encodeURIComponent(title)}`;
        }
    </script>

</body>

</html>

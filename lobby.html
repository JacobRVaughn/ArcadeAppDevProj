<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduQuest Lobby</title>

    <!-- Reuse your existing CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">

    <!-- Background blobs -->
    <div class="background-blur"></div>
    <div class="background-blur-bottom"></div>

    <!-- Lobby box (reuse auth-box styling) -->
    <div class="auth-box">
        <h1>EDUQUEST</h1>
        <p>Select a game type to begin</p>

        <!-- Game Type Selection -->
        <div class="tabs">
            <button class="tab active" id="catchStars" onclick="goToGame(event, 'math_catch')">
                Math Catch
            </button>
            <button class="tab" id="readingQuest" onclick="goToGame(event, 'reading_quest')">
                Word Blitz
            </button>
            <button class="tab" id="towerDefense" onclick="goToGame(event, 'tower')">
                Math & Letters Tower Kingdom
            </button>
        </div>

        <!-- Footer -->
    </div>

</div>

<script>
    function goToGame(event, game) {
        event.preventDefault();
        window.location.href = `games/${game}/build/web/index.html`;
    }
</script>

</body>
</html>
